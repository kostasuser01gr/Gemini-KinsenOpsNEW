name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install Dependencies
        run: npm install && cd apps/worker && npm install && cd ../web && npm install

      - name: Typecheck
        run: cd apps/web && npx tsc --noEmit && cd ../worker && npx tsc --noEmit

      - name: Unit Tests
        run: cd apps/worker && npm run test

      - name: Audit
        run: cd apps/web && npm audit --audit-level=high && cd ../worker && npm audit --audit-level=high
