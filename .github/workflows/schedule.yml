name: Scheduled Operations & Keepalive

on:
  schedule:
    - cron: '0 0 * * *' # Nightly verify
    - cron: '0 0 * * 0' # Weekly e2e + audit
  workflow_dispatch: # Allow manual trigger

jobs:
  nightly-verify:
    if: github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: make verify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STRICT_FREE_MODE: "true"

  weekly-deep-scan:
    if: github.event.schedule == '0 0 * * 0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: make e2e
      - run: make audit

  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Keepalive Commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          date > .keepalive
          git add .keepalive
          git commit -m "Keepalive scheduled workflow [skip ci]" || exit 0
          git push
